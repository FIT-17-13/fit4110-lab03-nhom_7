$kind: http-request
name: GET /readings/latest - list latest readings
url: "{{baseUrl}}/readings/latest?device_id=ESP32-LAB-A01&limit=5"
method: GET
headers:
  Authorization: Bearer {{authToken}}
queryParams:
  device_id: ESP32-LAB-A01
  limit: "5"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      pm.test('Response contains items array', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('items');
        pm.expect(json.items).to.be.an('array');
      });
    language: text/javascript
order: 2000
