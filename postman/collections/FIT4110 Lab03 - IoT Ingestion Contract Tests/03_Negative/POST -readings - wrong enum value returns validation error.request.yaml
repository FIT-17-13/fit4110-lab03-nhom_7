$kind: http-request
name: POST /readings - wrong enum value returns validation error
description: Negative test cho enum ngoài contract.
url: "{{baseUrl}}/readings"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{authToken}}
  Prefer: code=400
body:
  type: json
  content: |-
    {
      "device_id": "ESP32-LAB-A01",
      "metric": "temp_hot",
      "value": 31.5,
      "unit": "celsius",
      "timestamp": "2026-05-13T08:30:00+07:00"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Wrong metric enum returns client error', function () {
        pm.expect([400, 422]).to.include(pm.response.code);
      });
      pm.test('Error response has detail', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('detail');
      });
    language: text/javascript
order: 2000
