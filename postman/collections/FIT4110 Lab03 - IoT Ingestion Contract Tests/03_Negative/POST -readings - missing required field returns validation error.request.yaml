$kind: http-request
name: POST /readings - missing required field returns validation error
description: "Prefer: code=400 chỉ giúp Prism chọn response lỗi theo contract; service thật phải tự validate payload."
url: "{{baseUrl}}/readings"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{authToken}}
  Prefer: code=400
body:
  type: json
  content: |-
    {
      "metric": "temperature",
      "value": 31.5,
      "unit": "celsius",
      "timestamp": "2026-05-13T08:30:00+07:00"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Invalid payload returns client error', function () {
        pm.expect([400, 422]).to.include(pm.response.code);
      });
      pm.test('Error response follows ProblemDetails shape', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('title');
        pm.expect(json).to.have.property('status');
        pm.expect(json.status).to.be.within(400, 599);
      });
    language: text/javascript
order: 1000
