$kind: http-request
name: GET /readings/latest - limit above max is rejected
url: "{{baseUrl}}/readings/latest?limit=101"
method: GET
headers:
  Authorization: Bearer {{authToken}}
  Prefer: code=400
queryParams:
  limit: "101"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Limit above max returns client error', function () {
        pm.expect([400, 422]).to.include(pm.response.code);
      });
    language: text/javascript
order: 3000
