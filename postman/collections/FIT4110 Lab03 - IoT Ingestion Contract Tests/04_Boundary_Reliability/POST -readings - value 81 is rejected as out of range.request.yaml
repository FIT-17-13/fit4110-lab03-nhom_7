$kind: http-request
name: POST /readings - value 81 is rejected as out of range
description: Boundary test đúng phải kiểm response. Không kiểm lại request body đã gửi.
url: "{{baseUrl}}/readings"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{authToken}}
  Prefer: code=400
body:
  type: json
  content: |-
    {
      "device_id": "ESP32-LAB-A01",
      "metric": "temperature",
      "value": 81,
      "unit": "celsius",
      "timestamp": "2026-05-13T08:30:00+07:00"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Out-of-range value returns client error', function () {
        pm.expect([400, 422]).to.include(pm.response.code);
      });
      pm.test('Boundary test checks response, not request body', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('status');
        pm.expect(json.status).to.be.within(400, 599);
      });
    language: text/javascript
order: 2000
