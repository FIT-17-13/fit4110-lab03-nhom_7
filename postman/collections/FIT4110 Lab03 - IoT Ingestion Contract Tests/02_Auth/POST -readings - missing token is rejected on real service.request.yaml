$kind: http-request
name: POST /readings - missing token is rejected on real service
description: "Auth test thật: không dùng Prefer: code=401. Khi chạy trên mock, test được skip có kiểm soát vì Prism không chứng minh auth thật."
url: "{{baseUrl}}/readings"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "device_id": "ESP32-LAB-A01",
      "metric": "temperature",
      "value": 31.5,
      "unit": "celsius",
      "timestamp": "2026-05-13T08:30:00+07:00"
    }
scripts:
  - type: afterResponse
    code: |-
      const env = pm.environment.get('env') || 'mock';
      if (env === 'mock') {
        pm.test('Skipped on mock: Prism does not enforce real auth without a service implementation', function () {
          pm.expect(true).to.eql(true);
        });
      } else {
        pm.test('Missing token returns 401 or 403', function () {
          pm.expect([401, 403]).to.include(pm.response.code);
        });
      }
    language: text/javascript
order: 2000
